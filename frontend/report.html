<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Report Disaster | AidLink</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        AidLink
      </div>
      <nav class="nav-links">
        <a href="/home.html">Home</a>
        <a href="/dashboard.html">Command Center</a>
        <a href="/report.html" class="active">Report Disaster</a>
        <a href="/request.html">Request Resources</a>
        <a href="/volunteers.html">Volunteers</a>
        <a href="/resources.html">Resources</a>
      </nav>
      <div
        style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; color: #64748b;">
        v1.2.0 | Senior Architect Edition
      </div>
    </aside>

    <main class="main-content">
      <header style="margin-bottom: 32px;">
        <h1 style="font-size: 28px;">Report a Disaster</h1>
        <p class="text-muted">Provide accurate information to help emergency responders at once.</p>
      </header>

      <div class="card" style="max-width: 800px; margin: 0 auto;">
        <form id="reportForm">
          <div class="form-group">
            <label>Disaster Title / Type</label>
            <input name="title" placeholder="e.g. Flash Flood, Forest Fire..." required>
          </div>
          <div class="form-group">
            <label>Location (State/Region)</label>
            <input name="location" id="locationSearch" placeholder="e.g. Kerala, Tamil Nadu..." required>
          </div>
          <div id="geoDisplay"
            style="margin-top: -10px; margin-bottom: 20px; font-size: 11px; color: var(--primary); display: flex; align-items: center; gap: 6px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            <span id="geoStatus">Detecting precise GPS coordinates...</span>
            <input type="hidden" name="lat" id="latInput">
            <input type="hidden" name="lng" id="lngInput">
          </div>
          <div class="form-group">
            <label>Severity Level</label>
            <select name="severity">
              <option value="Low">Low - Monitoring</option>
              <option value="Medium">Medium - Intervention Needed</option>
              <option value="High">High - Critical Situation</option>
            </select>
          </div>
          <div class="form-group">
            <label>Detailed Description</label>
            <textarea name="description" rows="4"
              placeholder="Describe the situation, required help, and current status..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Emergency Report</button>
        </form>
        <p id="status" class="mt-4 text-center"></p>
      </div>
    </main>
  </div>

  <script src="/js/session.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/report.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/realtime.js"></script>
  <script>
    if (!session.getToken()) {
      window.location = '/';
    }
  </script>
</body>

</html>
